{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>BookMyShow Clone</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <header class="topbar">
        <div class="layout-container topbar-inner">
            <div class="topbar-left">
                <a href="{% url 'home' %}" class="logo-link">
                    <img src="{% static 'images/logo.png' %}" alt="BookMyShow" class="site-logo">
                </a>

                <form method="get" action="{% url 'movie_list' %}" class="search-form">
                    <input
                        type="text"
                        name="q"
                        class="search-input"
                        placeholder="Search for Movies, Events, Plays, Sports and Activities"
                    >
                </form>
            </div>

            <div class="topbar-right">
                <form method="get" action="{% url 'home' %}" class="location-form">
                    <select name="location" class="location-select" onchange="this.form.submit()">
                        <option value="Bengaluru" {% if selected_location == "Bengaluru" %}selected{% endif %}>Bengaluru</option>
                            {% if locations %}
                                {% for loc in locations %}
                                    <option value="{{ loc }}" {% if selected_location == loc %}selected{% endif %}>{{ loc }}</option>
                                {% endfor %}
                            {% endif %}
                    </select>
                </form>

                {% if user.is_authenticated %}
                    <div class="user-greeting">Hi, {{ user.username }}</div>
                    <a href="{% url 'my_bookings' %}" class="header-btn">My Bookings</a>

                    <form action="{% url 'logout' %}" method="post" style="display:inline;">
                        {% csrf_token %}
                        <button type="submit" class="header-btn">Logout</button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}" class="signin-btn">Sign in</a>
                {% endif %}
            </div>
        </div>
    </header>

    <nav class="main-subnav">
        <div class="layout-container subnav-inner">
            <div class="subnav-left">
                <a href="{% url 'home' %}">Home</a>
                <a href="{% url 'movie_list' %}">Movies</a>
                <a href="{% url 'events_page' %}">Events</a>
                <a href="{% url 'concerts_page' %}">Concerts</a>
                <a href="{% url 'matches_page' %}">Matches</a>
            </div>

            <div class="subnav-right">
                <a href="{% url 'list_your_show' %}">ListYourShow</a>
                <a href="#">Corporates</a>
                <a href="#">Offers</a>
                <a href="#">Gift Cards</a>
            </div>
        </div>
    </nav>

    <main class="page-content">
        {% block content %}{% endblock %}
    </main>

    <script>
        function toggleReplyForm(formId) {
            const form = document.getElementById(formId);
            if (form) {
                form.classList.toggle("show-reply-form");
            }
        }
    </script>
</body>
</html>
