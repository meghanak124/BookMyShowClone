{% load static %}
<!doctype html>
<html>
    <head>
        <title>BookMyShow Clone</title>
        <link rel="stylesheet" href="{% static 'css/style.css' %}" />
        {% block extra_css %}{% endblock %}
    </head>
    <script>
        function toggleReplyForm(formId) {
            const form = document.getElementById(formId);
            if (form) {
                form.classList.toggle("show-reply-form");
            }
        }
    </script>
    <body>
        <header class="topbar">
            <div class="logo-section">
                <a href="{% url 'home' %}" class="logo">BookMyShow</a>
            </div>

            <div class="nav-right">
                {% if user.is_authenticated %}
                <span class="username">Hi, {{ user.username }}</span>
                <a href="{% url 'my_bookings' %}" class="nav-btn"
                    >My Bookings</a
                >

                <form
                    action="{% url 'logout' %}"
                    method="post"
                    style="display: inline"
                >
                    {% csrf_token %}
                    <button type="submit" class="nav-btn logout-btn">
                        Logout
                    </button>
                </form>
                {% else %}
                <a href="{% url 'signup' %}" class="signin-btn">Sign in</a>
                <a href="{% url 'login' %}" class="signin-btn">Login</a>
                {% endif %}

                <button class="menu-btn">⋮</button>
            </div>
        </header>

        <nav class="subnav">
            <a href="{% url 'home' %}">Home</a>
            <a href="{% url 'movie_list' %}">Movies</a>
        </nav>

        <main class="page-content">{% block content %}{% endblock %}</main>
    </body>
</html>
