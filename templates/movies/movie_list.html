{% extends "base.html" %} {% block content %}
<h1>Movies</h1>

<div class="movie-grid">
    {% for movie in movies %}
    <a href="{% url 'movie_detail' movie.id %}" class="movie-card-link">
        <div class="movie-card">
            {% if movie.poster_url %}
            <img src="{{ movie.poster_url }}" alt="{{ movie.title }}" />
            {% endif %}
            <h3>{{ movie.title }}</h3>
            <p>{{ movie.genre }}</p>
            <p>{{ movie.language }}</p>
        </div>
    </a>
    {% empty %}
    <p>No movies available.</p>
    {% endfor %}
</div>
{% endblock %}
